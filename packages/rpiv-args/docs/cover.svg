<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-args — Arguments and shell substitution in skill prompts" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-args — Arguments and shell substitution in skill prompts</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #7A7468; }
      .dim { fill: #4A463F; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <!-- title bar -->
    <rect x="64" y="56" width="1152" height="44" fill="#16120E"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-args</text>

    <!-- header -->
    <text class="mono mint" x="120" y="156" font-size="36" font-weight="700"># rpiv-args</text>
    <text class="mono muted" x="120" y="186" font-size="17" letter-spacing="0.5">Arguments and shell output, baked into the skill prompt.</text>

    <!-- vertical divider -->
    <line x1="640" y1="220" x2="640" y2="680" stroke="#2A2620"/>

    <!-- ============ LEFT COLUMN: $ARGUMENTS ============ -->
    <text class="mono accent" x="120" y="240" font-size="13" letter-spacing="2" font-weight="700">A &#8212; ARGUMENTS</text>
    <text class="mono" x="120" y="278" font-size="18"><tspan class="mint" font-weight="700">&#10095;</tspan> <tspan class="ink">/skill:deploy api production</tspan></text>

    <text class="mono muted" x="120" y="324" font-size="12" letter-spacing="2">SKILL BODY</text>
    <text class="mono" xml:space="preserve" x="120" y="358" font-size="19"><tspan class="muted">  Deploy service </tspan><tspan class="accent" font-weight="700">$1</tspan><tspan class="muted"> to </tspan><tspan class="accent" font-weight="700">$2</tspan><tspan class="muted">.</tspan></text>
    <text class="mono" xml:space="preserve" x="120" y="386" font-size="19"><tspan class="muted">  Tag: </tspan><tspan class="accent" font-weight="700">$ARGUMENTS</tspan></text>

    <text class="mono mint" x="356" y="430" font-size="22" font-weight="700" text-anchor="middle">&#8595;</text>

    <text class="mono muted" x="120" y="472" font-size="12" letter-spacing="2">RENDERED</text>
    <text class="mono ink" xml:space="preserve" x="120" y="506" font-size="19">  Deploy service <tspan class="mint" font-weight="700">api</tspan> to <tspan class="mint" font-weight="700">production</tspan>.</text>
    <text class="mono ink" xml:space="preserve" x="120" y="534" font-size="19">  Tag: <tspan class="mint" font-weight="700">api production</tspan></text>

    <text class="mono" x="120" y="610" font-size="12" letter-spacing="2"><tspan class="mint">&#10003;</tspan> <tspan class="muted">POSITIONAL + FULL</tspan></text>

    <!-- ============ RIGHT COLUMN: !`shell` ============ -->
    <text class="mono accent" x="680" y="240" font-size="13" letter-spacing="2" font-weight="700">B &#8212; SHELL SUBSTITUTION</text>
    <text class="mono" x="680" y="278" font-size="18"><tspan class="mint" font-weight="700">&#10095;</tspan> <tspan class="ink">/skill:commit</tspan></text>

    <text class="mono muted" x="680" y="324" font-size="12" letter-spacing="2">SKILL BODY</text>
    <text class="mono" xml:space="preserve" x="680" y="358" font-size="19"><tspan class="muted">  Draft a commit for the diff.</tspan></text>
    <text class="mono" xml:space="preserve" x="680" y="386" font-size="19"><tspan class="accent" font-weight="700">  !`git status -s`</tspan></text>
    <text class="mono" xml:space="preserve" x="680" y="412" font-size="19"><tspan class="accent" font-weight="700">  !`git log -3 --oneline`</tspan></text>

    <text class="mono mint" x="916" y="446" font-size="22" font-weight="700" text-anchor="middle">&#8595;</text>

    <text class="mono muted" x="680" y="478" font-size="12" letter-spacing="2">RENDERED</text>
    <text class="mono ink" xml:space="preserve" x="680" y="506" font-size="17">  Draft a commit for the diff.</text>
    <text class="mono mint" xml:space="preserve" x="680" y="530" font-size="16">   M src/auth/session.ts</text>
    <text class="mono mint" xml:space="preserve" x="680" y="552" font-size="16">   M src/auth/session.test.ts</text>
    <text class="mono mint" xml:space="preserve" x="680" y="574" font-size="16">  a3f91c2 fix(auth): refresh token race</text>
    <text class="mono mint" xml:space="preserve" x="680" y="596" font-size="16">  7d2e8b4 feat(auth): session.revokeAll()</text>

    <text class="mono" x="680" y="640" font-size="12" letter-spacing="2"><tspan class="mint">&#10003;</tspan> <tspan class="muted">EVIDENCE, NOT TOOL CALLS</tspan></text>

    <!-- footer -->
    <rect x="64" y="708" width="1152" height="36" fill="#16120E"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-args 1.10</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">$1 $2 $ARGUMENTS</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">!`cmd`</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-args</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
